<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description | escape }}" />
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --text: #24292f;
        --muted: #57606a;
        --accent: #0969da;
        --link: #0969da;
        --code-bg: #f6f8fa;
        --border: #d0d7de;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 20px 48px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 28px;
        padding: 8px 0 18px;
        border-bottom: 1px solid var(--border);
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .brand-title {
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .brand-subtitle {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .nav a {
        padding: 6px 10px;
        border-radius: 6px;
        background: transparent;
        color: var(--accent);
        font-size: 0.92rem;
        text-decoration: none;
      }

      .nav a:hover {
        background: #f6f8fa;
        text-decoration: none;
      }

      main {
        padding-bottom: 48px;
      }

      article {
        padding: 0;
        background: transparent;
        line-height: 1.7;
      }

      h1, h2, h3, h4 {
        line-height: 1.25;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 4vw, 2.7rem);
        letter-spacing: -0.03em;
      }

      h2 {
        margin-top: 2rem;
        padding-top: 0.25rem;
        border-top: 1px solid var(--border);
        font-size: 1.45rem;
        letter-spacing: -0.02em;
      }

      h3 {
        margin-top: 1.5rem;
        font-size: 1.15rem;
      }

      p, li {
        color: var(--text);
      }

      p, ul, ol, table, pre, blockquote {
        margin-bottom: 1rem;
      }

      ul, ol {
        padding-left: 1.35rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 8px;
      }

      th, td {
        border: 1px solid var(--border);
        padding: 10px 12px;
        vertical-align: top;
      }

      th {
        background: #f6f8fa;
        text-align: left;
      }

      code {
        padding: 0.18rem 0.4rem;
        border-radius: 6px;
        background: var(--code-bg);
        color: #24292f;
        font-size: 0.95em;
      }

      pre {
        overflow: auto;
        padding: 16px 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--code-bg);
      }

      pre code {
        padding: 0;
        background: transparent;
      }

      blockquote {
        margin-left: 0;
        padding: 0.75rem 1rem;
        border-left: 4px solid #d0d7de;
        background: #f6f8fa;
        color: var(--text);
      }

      img {
        max-width: 100%;
      }

      .mermaid {
        overflow-x: auto;
        margin: 1.25rem 0;
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
      }

      .mermaid svg {
        max-width: 100%;
        height: auto;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      }

      .mermaid text,
      .mermaid .nodeLabel,
      .mermaid .edgeLabel,
      .mermaid .label {
        fill: #24292f !important;
        color: #24292f !important;
      }

      @media (max-width: 720px) {
        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .nav {
          justify-content: flex-start;
        }

        .shell {
          padding: 18px 14px 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="eyebrow">Platform Docs</div>
          <div class="brand-title">{{ site.title | default: "Monolotic App Platform Docs" }}</div>
          <div class="brand-subtitle">{{ site.description }}</div>
        </div>
        <nav class="nav" aria-label="Documentation navigation">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/argocd-explain/' | relative_url }}">Argo CD</a>
          <a href="{{ '/backend-guide/' | relative_url }}">Backend</a>
          <a href="{{ '/end-to-end-workflow/' | relative_url }}">Workflow</a>
          <a href="{{ '/production-flow/' | relative_url }}">Production</a>
          <a href="{{ '/client-story/' | relative_url }}">Client Story</a>
          <a href="{{ '/jenkins-and-infra-guide/' | relative_url }}">Jenkins &amp; Infra</a>
        </nav>
      </header>

      <main>
        <article>
          {{ content }}
        </article>
      </main>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
      window.addEventListener("load", function () {
        const blocks = Array.from(document.querySelectorAll("pre > code.language-mermaid"));
        if (!blocks.length || !window.mermaid) {
          return;
        }

        window.mermaid.initialize({
          startOnLoad: false,
          theme: "base",
          securityLevel: "strict",
          themeVariables: {
            background: "#ffffff",
            primaryColor: "#f6f8fa",
            primaryTextColor: "#24292f",
            textColor: "#24292f",
            lineColor: "#d0d7de",
            nodeBorder: "#d0d7de",
            clusterBkg: "#ffffff",
            clusterBorder: "#d0d7de",
            secondaryColor: "#f6f8fa",
            tertiaryColor: "#ffffff",
            fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
          },
        });

        blocks.forEach(function (block) {
          const pre = block.parentElement;
          const diagram = document.createElement("div");
          diagram.className = "mermaid";
          diagram.textContent = block.textContent;

          if (pre && pre.parentElement) {
            pre.parentElement.replaceChild(diagram, pre);
          }
        });

        window.mermaid.run({ querySelector: ".mermaid" });
      });
    </script>
  </body>
</html>
